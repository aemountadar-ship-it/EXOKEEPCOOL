::-webkit-scrollbar{width:0}
button{border:none;cursor:pointer;font-family:inherit}

.header{background:rgba(0,0,0,0.92);border-bottom:1px solid rgba(255,255,255,0.08);padding:14px 16px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center}
.logo-title{font-size:18px;font-weight:900;letter-spacing:3px;color:#FF6B35}

.nav-btn{padding:7px 12px;border-radius:20px;font-size:16px;transition:all 0.2s}
.nav-btn.active{background:#FF6B35;color:#0a0a0f}
.nav-btn:not(.active){background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6)}
.view{padding:20px 16px;display:none}
.view.active{display:block}
.pbar{height:6px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden}
.pbar-fill{height:100%;border-radius:4px;transition:width 0.5s}
.week-box{background:linear-gradient(135deg,rgba(255,107,53,0.12),rgba(78,205,196,0.12));border:1px solid rgba(255,107,53,0.3);border-radius:20px;padding:18px;margin-bottom:18px}
.mini-cal{display:flex;gap:5px;margin-bottom:18px}
.cal-day{flex:1;aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.cal-dot{position:absolute;top:2px;right:2px;width:5px;height:5px;border-radius:50%;background:#34D399}
.day-selector{display:flex;gap:5px;margin-bottom:16px}
.day-btn{flex:1;min-width:52px;padding:8px 4px;border-radius:12px;font-size:11px;font-weight:800;cursor:pointer;position:relative;text-align:center;line-height:1.4;transition:all 0.2s}
.section-lbl{font-size:10px;font-weight:700;letter-spacing:2px;margin-bottom:8px}
.ex-row{border-radius:12px;margin-bottom:8px;border-width:1px;border-style:solid;overflow:hidden}
.ex-main{display:flex;align-items:center;gap:12px;padding:12px 14px}
.cb{width:28px;height:28px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-width:2px;border-style:solid;background:transparent;cursor:pointer;transition:all 0.2s}
.info-btn{width:30px;height:30px;border-radius:50%;font-size:15px;font-weight:900;font-style:italic;font-family:Georgia,serif;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
.stretch-item{font-size:12px;color:rgba(255,255,255,0.35);padding:3px 0 3px 10px;border-left:2px solid rgba(255,255,255,0.1);margin-bottom:3px}
.day-card{background:rgba(255,255,255,0.04);border-radius:20px;overflow:hidden;margin-bottom:14px}
.day-hd{padding:18px 18px 14px;border-bottom:1px solid rgba(255,255,255,0.06)}
.day-bd{padding:16px 18px 18px}
.valid-banner{background:linear-gradient(135deg,#4ECDC4,#34D399);border-radius:16px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 24px rgba(78,205,196,0.3)}
.rest-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:24px;text-align:center}
.stats-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:18px;margin-bottom:14px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,0.97);border-top:1px solid rgba(255,255,255,0.06);display:flex;padding:10px 16px 20px;gap:6px}
.bnav-btn{flex:1;padding:8px 4px;border-radius:12px;font-size:10px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:all 0.2s;border:1px solid transparent;background:transparent;color:rgba(255,255,255,0.3)}
.bnav-btn.active{background:rgba(255,107,53,0.15);border-color:rgba(255,107,53,0.3);color:#FF6B35}

.log-panel{background:rgba(0,0,0,0.3);border-top:1px solid rgba(255,255,255,0.06);padding:12px 14px}
.log-title{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:1px;margin-bottom:8px;font-weight:700}
.log-sets{display:flex;flex-direction:column;gap:6px}
.log-set-row{display:flex;align-items:center;gap:8px}
.log-set-num{font-size:11px;color:rgba(255,255,255,0.3);width:40px;flex-shrink:0}
.log-input{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:6px 10px;font-size:13px;width:70px;text-align:center}

.log-pr{font-size:10px;font-weight:700;margin-top:4px;padding-left:48px}

/* ── TIMER ── */
.timer-overlay{position:fixed;inset:0;z-index:8000;background:rgba(0,0,0,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.timer-circle{width:200px;height:200px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.timer-svg{position:absolute;top:0;left:0;width:200px;height:200px;transform:rotate(-90deg)}
.timer-num{font-size:56px;font-weight:900;letter-spacing:-2px}
.timer-lbl{font-size:12px;color:rgba(255,255,255,0.4);letter-spacing:2px}
.timer-btns{display:flex;gap:12px}
.timer-btn{padding:14px 28px;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.9);display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#13131a;width:100%;max-height:92vh;overflow-y:auto;border-radius:24px 24px 0 0;animation:su 0.25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-img-zone{width:100%;height:220px;background:#efefef;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.modal-img-zone img{width:100%;height:100%;object-fit:cover}
.modal-content{padding:20px 20px 12px}
.modal-close-bar{padding:8px 20px 24px}
.modal-close-big{width:100%;padding:15px;border-radius:14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);font-size:15px;font-weight:700;letter-spacing:1px;cursor:pointer}

.calc-box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:18px;margin-bottom:14px}

.calc-table{width:100%;border-collapse:collapse}

function storKey(){const n=new Date(),m=new Date(n);m.setDate(n.getDate()-((n.getDay()+6)%7));return"kc_"+m.toISOString().slice(0,10);}
function loadP(){try{return JSON.parse(localStorage.getItem(storKey())||"{}");}catch{return{};}}
function saveP(d){try{localStorage.setItem(storKey(),JSON.stringify(d));}catch{}}
function loadH(){try{return JSON.parse(localStorage.getItem("kc_hist")||"[]");}catch{return[];}}
function saveH(d){try{localStorage.setItem("kc_hist",JSON.stringify(d));}catch{}}
// Journal de poids : clé "log_YYYY-MM-DD_exName_set"
function logKey(exName,set){return "log_"+new Date().toISOString().slice(0,10)+"_"+exName+"_"+set;}
function loadLog(exName,set){try{return JSON.parse(localStorage.getItem(logKey(exName,set))||"null");}catch{return null;}}
function saveLog(exName,set,val){try{localStorage.setItem(logKey(exName,set),JSON.stringify(val));}catch{}}
// PR (personal record) par exercice
function prKey(exName){return "pr_"+exName;}
function loadPR(exName){try{return JSON.parse(localStorage.getItem(prKey(exName))||"null");}catch{return null;}}
function savePR(exName,kg){try{localStorage.setItem(prKey(exName),JSON.stringify(kg));}catch{}}
// Historique log semaine précédente pour affichage
function prevLogKey(exName,set){
  const n=new Date(),m=new Date(n);
  m.setDate(n.getDate()-((n.getDay()+6)%7)-7);
  return "log_"+m.toISOString().slice(0,10)+"_"+exName+"_"+set;
}
function loadPrevLog(exName,set){try{return JSON.parse(localStorage.getItem(prevLogKey(exName,set))||"null");}catch{return null;}}

function weekNum(d){const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));dt.setUTCDate(dt.getUTCDate()+4-(dt.getUTCDay()||7));return Math.ceil((((dt-new Date(Date.UTC(dt.getUTCFullYear(),0,1)))/86400000)+1)/7);}

let progress = loadP();
let history  = loadH();
let curView  = "home";
let curDay   = DAY_MAP[new Date().getDay()] || "lundi";
const todayId = DAY_MAP[new Date().getDay()] || null;

function sessPct(d){
  const total=d.exercises.length+2;
  const done=d.exercises.filter(ex=>progress[d.id+"_"+ex.name]).length
    +(progress[d.id+"_cardio"]?1:0)+(progress[d.id+"_finisher"]?1:0);
  return{pct:Math.round((done/total)*100),done,total};
}
function sessDone(){return DAYS.filter(d=>sessPct(d).pct===100).length;}
function weekValid(){return sessDone()>=3;}

function toggle(key){
  progress[key]=!progress[key];
  saveP(progress);
  const done=sessDone(),lbl="S"+weekNum(new Date());
  const i=history.findIndex(h=>h.label===lbl);
  if(i>=0)history[i].sessions=done;
  else if(done>0)history.push({label:lbl,sessions:done});
  saveH(history);
  render();
}

// ── JOURNAL POIDS ─────────────────────────────────────────────────────────────

function saveLogInput(exName, set){
  const kgEl = document.getElementById("kg_"+exName+"_"+set);
  const repEl = document.getElementById("rep_"+exName+"_"+set);
  if(!kgEl || !repEl) return;
  const kg = parseFloat(kgEl.value), rep = parseInt(repEl.value);
  if(!isNaN(kg) && !isNaN(rep) && kg > 0){
    saveLog(exName, set, {kg, rep});
    // Mise à jour PR
    const pr = loadPR(exName);
    const rm = kg * (1 + rep/30); // formule Epley approximative
    if(!pr || rm > pr.rm) savePR(exName, {kg, rep, rm: Math.round(rm*10)/10});
    // Rafraîchir juste les badges PR sans re-render complet
    updatePRBadge(exName);
  }
}

function updatePRBadge(exName){
  const el = document.getElementById("pr_badge_"+CSS.escape(exName));
  if(!el) return;
  const pr = loadPR(exName);
  if(pr) el.innerHTML = `🏆 PR : ${pr.kg}kg × ${pr.rep} reps`;
}

function toggleLog(exName, sets){
  const panel = document.getElementById("logpanel_"+CSS.escape(exName));
  if(!panel) return;
  panel.style.display = panel.style.display === "none" ? "block" : "none";
}

// ── CHRONOMÈTRE DE REPOS ──────────────────────────────────────────────────────

let timerInterval = null;
let timerTotal    = 90;
let timerLeft     = 90;
const CIRC        = 2 * Math.PI * 88; // circonférence du cercle r=88

function startTimer(sec){
  timerTotal = sec;
  timerLeft  = sec;
  document.getElementById("timer-overlay").style.display = "flex";
  updateTimerUI();
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    timerLeft--;
    updateTimerUI();
    if(timerLeft <= 0){
      clearInterval(timerInterval);
      // Vibration si supportée
      if(navigator.vibrate) navigator.vibrate([300,100,300]);
      document.getElementById("timer-num").textContent = "GO !";
      document.getElementById("timer-arc").style.stroke = "#34D399";
    }
  }, 1000);
}

function updateTimerUI(){
  const el = document.getElementById("timer-num");
  const arc = document.getElementById("timer-arc");
  if(!el || !arc) return;
  el.textContent = timerLeft > 0 ? timerLeft : "GO !";
  const pct = timerLeft / timerTotal;
  arc.style.strokeDashoffset = CIRC * (1 - pct);
  arc.style.stroke = timerLeft <= 10 ? "#F59E0B" : timerLeft <= 0 ? "#34D399" : "#FF6B35";
}

function addTimer(delta){
  timerLeft = Math.max(5, timerLeft + delta);
  timerTotal = Math.max(5, timerTotal + delta);
  updateTimerUI();
}

function closeTimer(){
  clearInterval(timerInterval);
  document.getElementById("timer-overlay").style.display = "none";
}

    <div class="section-lbl" style="color:${day.color}">⚡ FINISHER</div>
    <div style="background:${fdone?day.color+"15":"rgba(255,255,255,0.04)"};border:1px solid ${fdone?day.color+"40":"rgba(255,255,255,0.08)"};border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px">
      <button class="cb" style="border-color:${fdone?day.color:"rgba(255,255,255,0.2)"};background:${fdone?day.color:"transparent"}" onclick="toggle('${fk}')">
        ${fdone?`<span style="color:#0a0a0f;font-weight:900;font-size:14px">✓</span>`:""}
      </button>
      <div>
        <div style="font-size:13px;font-weight:700;color:${fdone?day.color:"#f0f0f0"};text-decoration:${fdone?"line-through":"none"};opacity:${fdone?0.55:1}">${day.finisher.name} — ${day.finisher.duration}</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px">${day.finisher.detail}</div>
      </div>
    </div>
  </div>`;

  // Étirements
  h+=`<div><div class="section-lbl" style="color:rgba(255,255,255,0.3)">🧘 RÉCUPÉRATION</div>`;
  day.stretching.forEach(s=>{h+=`<div class="stretch-item">${s}</div>`;});
  h+="</div></div></div>";
  document.getElementById("day-card-container").innerHTML=h;
}

// ── CALCULATEUR DE CHARGE ─────────────────────────────────────────────────────

function renderCalc(){
  // On ne recrée le HTML des inputs QU'une seule fois (première ouverture)
  if(document.getElementById("calc-kg")) {
    updateCalcTable(); // déjà affiché, juste mettre à jour le tableau
    return;
  }
  const stored = JSON.parse(localStorage.getItem("calc_state")||"{}");
  const kg  = stored.kg  || "";
  const rep = stored.rep || "";

  document.getElementById("view-calc").innerHTML=`
    <div style="font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.3);margin-bottom:18px">CALCULATEUR DE CHARGES</div>

    <div class="calc-box" style="margin-bottom:14px">
      <div style="font-size:14px;font-weight:700;color:#f0f0f0;margin-bottom:6px">Comment utiliser :</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.45);line-height:1.7">
        1️⃣ Fais une série avec un poids que tu connais.<br>
        2️⃣ Entre ce poids (ex : 40 kg) et le nombre de reps que tu as fait (ex : 10).<br>
        3️⃣ L'app calcule ta <strong style="color:#FF6B35">force maximale estimée (1RM)</strong> et te donne le <strong style="color:#f0f0f0">poids idéal</strong> pour chaque objectif.<br>
        4️⃣ La ligne <span style="color:#FF6B35;font-weight:700">orange</span> = zone d'hypertrophie (12 reps), idéale pour ton programme.
      </div>
    </div>

    <div class="calc-box">
      <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:12px;font-weight:600">Ton poids × tes reps :</div>
      <div class="calc-input-row">
        <div style="flex:1">
          <div style="font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:1px;margin-bottom:6px">POIDS SOULEVÉ (kg)</div>
          <input class="calc-input" id="calc-kg" type="number" min="0" step="0.5" placeholder="ex: 40" value="${kg}"
            oninput="saveCalcState();updateCalcTable()"/>
        </div>
        <div style="font-size:24px;color:rgba(255,255,255,0.2);padding-top:22px;text-align:center">×</div>
        <div style="flex:1">
          <div style="font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:1px;margin-bottom:6px">REPS RÉALISÉES</div>
          <input class="calc-input" id="calc-rep" type="number" min="1" step="1" placeholder="ex: 10" value="${rep}"
            oninput="saveCalcState();updateCalcTable()"/>
        </div>
      </div>
      <div id="calc-result"></div>
    </div>`;

  updateCalcTable();
}

function updateCalcTable(){
  const kgEl  = document.getElementById("calc-kg");
  const repEl = document.getElementById("calc-rep");
  const resEl = document.getElementById("calc-result");
  if(!kgEl || !repEl || !resEl) return;

  const kg  = parseFloat(kgEl.value);
  const rep = parseInt(repEl.value);

  if(!kg || !rep || kg <= 0 || rep <= 0){
    resEl.innerHTML = `<div style="text-align:center;padding:20px 0;font-size:13px;color:rgba(255,255,255,0.3)">
      ⬆️ Entre un poids et des reps pour voir tes charges
    </div>`;
    return;
  }

  // Formule Epley : 1RM estimée = poids × (1 + reps / 30)
  const orm = kg * (1 + rep / 30);

  const rows = [
    {pct:100, reps:"1",  label:"Force maximale",      desc:"Ta limite absolue"},
    {pct:90,  reps:"3",  label:"Force",                desc:"Développe la puissance"},
    {pct:85,  reps:"5",  label:"Force",                desc:"Développe la puissance"},
    {pct:80,  reps:"8",  label:"Hypertrophie",         desc:"Prise de masse"},
    {pct:75,  reps:"10", label:"Hypertrophie",         desc:"Prise de masse"},
    {pct:70,  reps:"12", label:"Hypertrophie",         desc:"Idéal pour ce programme", highlight:true},
    {pct:65,  reps:"15", label:"Endurance musculaire", desc:"Cardio-musculaire"},
    {pct:60,  reps:"20", label:"Endurance musculaire", desc:"Brûle-graisses"},
  ];

  let tableHtml = `
    <div style="margin:16px 0 12px;text-align:center;padding:12px;background:rgba(255,107,53,0.1);border-radius:12px;border:1px solid rgba(255,107,53,0.25)">
      <div style="font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:1px;margin-bottom:4px">1RM ESTIMÉE</div>
      <div style="font-size:28px;font-weight:900;color:#FF6B35">${Math.round(orm*10)/10} kg</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px">basé sur ${kg}kg × ${rep} reps</div>
    </div>
    <table class="calc-table">
      <thead><tr><th>%</th><th>Poids conseillé</th><th>Reps</th><th>Zone</th></tr></thead>
      <tbody>`;

  rows.forEach(row => {
    const weight = Math.round((orm * row.pct / 100) * 2) / 2; // arrondi au 0,5 kg
    const isCur  = row.reps == rep;
    const isHL   = row.highlight;
    tableHtml += `<tr ${(isCur||isHL) ? 'class="highlight"' : ""}>
      <td style="color:rgba(255,255,255,0.5)">${row.pct}%</td>
      <td><strong>${weight} kg</strong></td>
      <td>${row.reps} reps</td>
      <td style="font-size:11px;color:rgba(255,255,255,${(isCur||isHL)?"0.85":"0.3"})">${isCur?"👉 ":isHL?"⭐ ":""}${row.label}</td>
    </tr>`;
  });

  tableHtml += `</tbody></table>
    <div style="margin-top:10px;font-size:10px;color:rgba(255,255,255,0.2);text-align:center">
      Formule Epley · Poids arrondis au 0,5 kg · Estimation théorique
    </div>`;

  resEl.innerHTML = tableHtml;
}

function saveCalcState(){
  const kg  = document.getElementById("calc-kg")?.value  || "";
  const rep = document.getElementById("calc-rep")?.value || "";
  try{ localStorage.setItem("calc_state", JSON.stringify({kg, rep})); }catch{}
}

// ── STATS ─────────────────────────────────────────────────────────────────────

function renderStats(){
  const sd=sessDone(),wv=weekValid();
  let h=`<div style="font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.3);margin-bottom:16px">MES STATISTIQUES</div>`;
  if(wv) h+=`<div class="valid-banner"><span style="font-size:22px">🏆</span><div>
    <div style="font-size:15px;font-weight:900;color:#0a0a0f">SEMAINE VALIDÉE — ${sd} séances</div>
    <div style="font-size:11px;color:rgba(0,0,0,0.5)">Objectif atteint (min. 3 séances)</div>
  </div></div>`;

  h+=`<div class="stats-card"><div style="font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:2px;margin-bottom:12px">PROGRESSION PAR JOUR</div>`;
  DAYS.forEach(d=>{
    const{pct,done,total}=sessPct(d);
    h+=`<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:12px;font-weight:700">${d.emoji} ${d.label}</span>
          ${d.optional?`<span style="font-size:9px;color:#34D399">optionnel</span>`:""}
        </div>
        <span style="font-size:12px;color:${d.color};font-weight:700">${done}/${total}</span>
      </div>
      <div class="pbar"><div class="pbar-fill" style="width:${pct}%;background:${d.color}"></div></div>
    </div>`;
  });
  h+="</div>";

  // Records personnels
  const prs=[];
  ALL_EX.forEach(({ex,color})=>{const pr=loadPR(ex.name);if(pr)prs.push({name:ex.name,pr,color});});
  if(prs.length){
    h+=`<div class="stats-card"><div style="font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:2px;margin-bottom:14px">🏆 RECORDS PERSONNELS</div>`;
    prs.forEach(p=>{
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
        <span style="font-size:13px">${p.name}</span>
        <span style="font-size:13px;color:${p.color};font-weight:700">${p.pr.kg}kg × ${p.pr.rep}</span>
      </div>`;
    });
    h+="</div>";
  }

  h+=`<div class="stats-card"><div style="font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:2px;margin-bottom:14px">GROUPES MUSCULAIRES</div>`;
  [["Pectoraux","Lun+Ven+Dim","#FF6B35"],["Épaules / Triceps","Lun+Ven","#FF6B35"],
   ["Dos / Dorsaux","Ven+Sam+Dim","#A78BFA"],["Biceps / Abdos","Sam","#A78BFA"],
   ["Quadriceps / Fessiers","Mer+Ven","#4ECDC4"],["Ischio / Mollets","Mer","#4ECDC4"],
   ["Core / Gainage","Ven+Dim","#34D399"],["Cardio","Tous les jours","#F59E0B"]
  ].forEach(([l,d,c])=>{
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px">
      <span>${l}</span><span style="font-size:11px;color:${c};font-weight:700">${d}</span></div>`;
  });
  h+="</div>";

  if(history.length>0){
    const last8=history.slice(-8),maxS=Math.max(...last8.map(x=>x.sessions),3);
    h+=`<div class="stats-card"><div style="font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:2px;margin-bottom:14px">HISTORIQUE SEMAINES</div>
    <div style="display:flex;align-items:flex-end;gap:8px;height:60px;margin-bottom:8px">`;
    last8.forEach(w=>{
      const ht=Math.round((w.sessions/maxS)*48);
      const bg=w.sessions>=3?"#4ECDC4":w.sessions>=2?"#FF6B35":"rgba(255,255,255,0.15)";
      h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
        <div style="width:100%;border-radius:4px;min-height:4px;height:${ht}px;background:${bg};position:relative">
          ${w.sessions>=3?`<div style="position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:10px">⭐</div>`:""}
        </div>
        <span style="font-size:9px;color:rgba(255,255,255,0.3)">${w.label}</span>
      </div>`;
    });
    h+=`</div><div style="display:flex;gap:12px;justify-content:center;font-size:10px;color:rgba(255,255,255,0.3)">
      <span>🟢 ≥3 = validé ⭐</span><span>🟠 2 séances</span></div></div>`;
  }

  h+=`<button style="width:100%;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.4);font-size:12px;letter-spacing:2px;font-weight:700;cursor:pointer"
    onclick="if(confirm('Réinitialiser la semaine ?')){progress={};saveP({});render()}">RÉINITIALISER LA SEMAINE</button>`;
  document.getElementById("view-stats").innerHTML=h;
}

// ── RENDER ────────────────────────────────────────────────────────────────────

function render(){
  if(curView==="home")    renderHome();
  if(curView==="program") renderProgram();
  if(curView==="calc")    renderCalc();
  if(curView==="stats")   renderStats();
}

render();
</script>
